<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            margin: 0;
            padding: 0;
        }
        h2 {
            color: white;
            margin-top: 20px;
        }
        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
            width: 50%;
            margin: 20px auto;
            text-align: left;
        }
        label {
            font-size: 16px;
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }
        input[type="text"], select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        input[type="checkbox"] {
            width: auto;
            display: inline-block;
            margin-right: 5px;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
        .navigation {
            margin-top: 30px;
            text-align: center;
        }
        .navigation a {
            display: inline-block;
            padding: 10px 15px;
            margin: 5px;
            text-decoration: none;
            background-color: #6c757d;
            color: white;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .navigation a:hover {
            background-color: #545b62;
        }
        .btn-home { background-color: #17a2b8; }
        .btn-add { background-color: #28a745; }
        .btn-documents { background-color: #ffc107; color: black; }
    </style>
</head>
<body>
<h2>Add Document</h2>
<form th:action="@{/documents/save}" method="post" th:object="${document}">
    <label for="memberId">Member ID:</label>
    <input type="text" id="memberId" th:field="*{memberId}" required>
    <label for="documentName">Document Name:</label>
    <input type="text" id="documentName" th:field="*{documentName}" required>
    <label for="documentType">Document Type:</label>
    <select id="documentType" th:field="*{documentType}">
        <option value="ID">ID</option>
        <option value="License">License</option>
        <option value="Passport">Passport</option>
        <option value="Other">Other</option>
    </select>
    <label for="isActive">Is Active:</label>
    <input type="checkbox" id="isActive" th:field="*{isActive}">
    <button type="submit">Submit</button>
</form>
<div class="navigation">
    <a href="/" class="btn-home">🏠 Home</a>
    <a href="/documents/add" class="btn-add">🔄 Refresh</a>
    <a href="/documents/list" class="btn-documents">📜 View Member Documents</a>
</div>
</body>
</html>
