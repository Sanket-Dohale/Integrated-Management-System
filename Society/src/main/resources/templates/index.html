<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrated Management System</title>
    <style>
        body, h1, h2, button {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(to right, #141e30, #243b55);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .header {
            margin-bottom: 30px;
            text-align: center;
            width: 100%;
        }

        .title {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #4CAF50, #2196F3, #FFC107, #9C27B0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            position: relative;
            display: inline-block;
        }

        .title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #4CAF50, #2196F3, #FFC107, #9C27B0);
            border-radius: 3px;
        }

        .subtitle {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.8);
            margin-top: 10px;
        }

        .management-section {
            margin: 30px 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section-title {
            font-size: 2rem;
            margin-bottom: 25px;
            color: white;
            font-weight: bold;
            position: relative;
            text-align: center;
            width: 100%;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: currentColor;
            border-radius: 3px;
        }

        .facility-title {
            color: #4CAF50;
        }

        .document-title {
            color: #2196F3;
        }

        .society-title {
            color: #9C27B0;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 900px;
        }

        button {
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 15px 25px;
            border: none;
            border-radius: 100px; /* Increased for fully rounded pill shape */
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1), 0 3px 6px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px;
            min-width: 250px;
            width: 250px;
            height: 60px;
            box-sizing: border-box;
            text-align: center;
            white-space: nowrap;
        }

        .facility-button {
            background: linear-gradient(145deg, #4CAF50, #45a049);
        }

        .facility-button:hover {
            background: linear-gradient(145deg, #45a049, #4CAF50);
        }

        .doc-button {
            background: linear-gradient(145deg, #2196F3, #0b7dda);
        }

        .upload-button {
            background: linear-gradient(145deg, #FFC107, #ffab00);
        }

        .society-button {
            background: linear-gradient(145deg, #9C27B0, #7B1FA2);
        }

        .doc-button:hover {
            background: linear-gradient(145deg, #0b7dda, #2196F3);
        }

        .upload-button:hover {
            background: linear-gradient(145deg, #ffab00, #FFC107);
        }

        .society-button:hover {
            background: linear-gradient(145deg, #7B1FA2, #9C27B0);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
        }

        button i {
            margin-right: 8px;
            font-size: 1.1em;
        }

        button:focus {
            outline: none;
        }

        button:active {
            transform: translateY(1px);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
            }

            .section-title {
                font-size: 1.5rem;
            }

            .button-container {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }

            button {
                width: 100%;
                max-width: 300px;
                min-width: auto;
            }
        }
    </style>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
<div class="header">
    <h1 class="title">Integrated Management System</h1>
    <p class="subtitle">Manage your facility, documents, and society in one place</p>
</div>

<div class="management-section">
    <h2 class="section-title facility-title">Facility Management</h2>
    <div class="button-container">
        <button class="facility-button" onclick="location.href='/addMember'">
            <i class="fas fa-plus-circle"></i> Add Member
        </button>
        <button class="facility-button" onclick="location.href='/showMembers'">
            <i class="fas fa-users"></i> Show Members
        </button>
        <button class="upload-button" onclick="location.href='/bulkUpload'">
            <i class="fas fa-upload"></i> Bulk Upload
        </button>
    </div>
</div>

<div class="management-section">
    <h2 class="section-title document-title">Document Management</h2>
    <div class="button-container">
        <button class="doc-button" onclick="location.href='/documents/add'">
            <i class="fas fa-file-alt"></i> Add Document
        </button>
        <button class="doc-button" onclick="location.href='/documents/list'">
            <i class="fas fa-list"></i> Member Documents
        </button>
        <button class="upload-button" onclick="location.href='/upload'">
            <i class="fas fa-file-upload"></i> Bulk Document Upload
        </button>
    </div>
</div>

<div class="management-section">
    <h2 class="section-title society-title">Society Management</h2>
    <div class="button-container">
        <button class="society-button" onclick="location.href='/add-member'">
            <i class="fas fa-user-plus"></i> Add New Member
        </button>
        <button class="society-button" onclick="location.href='/members'">
            <i class="fas fa-users"></i> View Members
        </button>
        <button class="upload-button" onclick="location.href='/upload-members'">
            <i class="fas fa-upload"></i> Bulk Upload Members
        </button>
    </div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/js/all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
