<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Upload CSV File</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: white;
            margin-top: 20px;
        }
        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
            width: 50%;
            margin: 20px auto;
            text-align: left;
        }
        label {
            font-size: 16px;
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
        [th\\:if="${message}"] {
            color: green;
            font-weight: bold;
            margin: 20px auto;
            padding: 10px;
            background: white;
            border-radius: 5px;
            width: 50%;
        }
        a {
            display: inline-block;
            padding: 10px 15px;
            margin: 20px 5px;
            text-decoration: none;
            background-color: #6c757d;
            color: white;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        a:hover {
            background-color: #545b62;
        }
    </style>
</head>
<body>
<h1>Bulk Upload - Documents</h1>
<form method="POST" enctype="multipart/form-data" th:action="@{/upload}">
    <label for="file">Select CSV File:</label>
    <input type="file" name="file" id="file" accept=".csv" required>
    <button type="submit">Upload</button>
</form>
<br>
<div th:if="${message}">
    <p th:text="${message}"></p>
</div>
<a href="/">Back to Home</a>
</body>
</html>
